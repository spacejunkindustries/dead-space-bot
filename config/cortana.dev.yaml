# CORTANA development configuration — same structure as cortana.yaml.example,
# all paths under ./dev-data/ so a dev run never touches system locations.
# Run from the repo root: python -m cortana --config ../config/cortana.dev.yaml

discord:
  token_file: ./dev-data/token         # dev fallback; put a test bot token here (never commit)
  guild_id: 000000000000000000
  channels:
    intel_alerts: 000000000000000000
    intel_live:   000000000000000000
    health:       000000000000000000
  roles:
    pilot: 000000000000000000
    fc:    000000000000000000
  watch_voice_channels: [000000000000000000]
  auto_join: true

wake:
  model:  ./dev-data/models/wake/aura_command.onnx
  threshold: 0.55
  refractory_ms: 2000

capture:
  preroll_ms: 300
  endpoint_silence_ms: 400
  max_utterance_ms: 6000
  vad_aggressiveness: 2

stt:
  backend: faster-whisper
  model: small
  compute_type: int8
  cpu_threads: 1
  bias_with_gazetteer: true
  whisper_cpp_url: http://127.0.0.1:8080/inference

matching:
  phonetic_weight: 0.6
  text_weight: 0.4
  tiers:
    high_min: 0.80
    high_margin: 0.12
    medium_min: 0.55
  priors:
    recency_weight: 0.35
    recency_window_min: 10
    proximity_weight: 0.25
    proximity_max_jumps: 5
    reporter_history_weight: 0.15
    home_weight: 0.10

incidents:
  dedupe_window_s: 90
  stale_after_min: 20
  cancel_window_s: 30

discipline:
  user_cooldown_s: 30
  circuit_breaker:
    max_mentions: 12
    window_min: 10
  personal_pings_max: 10               # max personal /pingme subscriptions per pilot

tts:
  enabled: true
  voice: ./dev-data/models/piper/en_US-amy-medium.onnx
  binary: /usr/local/bin/piper
  max_utterance_s: 3

gazetteer:
  file: ./dev-data/gazetteer.yaml
  home_system: Otanuomi                # null/empty = no home bias (nomadic); see cortana.yaml.example
  include_all: false                   # true = entire seeded map active (nomadic mode, GDD §8.1)

ipc:
  socket: ./dev-data/cortana.sock

health:
  report_interval_min: 60
  voice_silence_alarm_s: 60

database:
  path: ./dev-data/cortana.db
