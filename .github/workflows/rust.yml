# CORTANA CI — Rust (ears). Runs only when ears/ or this workflow changes.
#
# Compiling Songbird (DAVE/MLS + Symphonia) takes minutes, so gating this on
# ears/** keeps brain-only changes — the large majority — off the Rust runner.
# On a push to main it also publishes the release binary to the ears-bin
# branch, which the droplet fetches with its clone credentials (GDD §17.3);
# the binary only changes when ears/ changes, so this gate loses no coverage.
name: ears (Rust)

on:
  push:
    paths:
      - "ears/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "ears/**"
      - ".github/workflows/rust.yml"

jobs:
  rust:
    name: ears (Rust)
    # Pinned to the droplet's OS (deploy/install.sh targets Ubuntu 24.04):
    # the published binary must link the droplet's glibc. ubuntu-latest will
    # eventually retarget to a newer release whose glibc the droplet lacks —
    # the sha256 check can't catch that (it authenticates content, not ABI).
    runs-on: ubuntu-24.04
    permissions:
      contents: write   # push the built binary to the ears-bin branch
    defaults:
      run:
        working-directory: ears
    steps:
      - uses: actions/checkout@v4

      # Songbird needs libopus; its DAVE/MLS dependencies build C++ via cmake.
      # NO ffmpeg — Songbird >=0.4 uses Symphonia in-process (constraint 3).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopus-dev cmake

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ears

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      # The droplet downloads this instead of compiling (GDD §17.3).
      - name: Upload cortana-ears binary
        uses: actions/upload-artifact@v4
        with:
          name: cortana-ears
          path: ears/target/release/cortana-ears
          if-no-files-found: error

      # Publish the binary to the ears-bin branch on every merge to main.
      # The droplet fetches it with the same read credentials as its clone
      # (deploy key), so install.sh needs no GitHub API token (GDD §17.3).
      - name: Publish binary to ears-bin branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ runner.temp }}
        run: |
          rm -rf ears-bin && mkdir ears-bin && cd ears-bin
          cp "${GITHUB_WORKSPACE}/ears/target/release/cortana-ears" .
          sha256sum cortana-ears > cortana-ears.sha256
          git init -q -b ears-bin
          git -c user.name="aura-ci" -c user.email="ci@users.noreply.github.com" \
            add -A
          git -c user.name="aura-ci" -c user.email="ci@users.noreply.github.com" \
            commit -qm "cortana-ears built from ${GITHUB_SHA}"
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" \
            ears-bin
