# CORTANA CI — Python (brain). Runs only when brain/ or this workflow changes,
# so brain-only work does not pay for the Rust/Songbird compile (see rust.yml).
name: brain (Python)

on:
  push:
    paths:
      - "brain/**"
      # The brain test suite reads the repo-level example configs
      # (tests/test_routing.py loads config/routing.yaml.example), so a
      # config-only change must run CI too or a breaking example edit
      # surfaces later on some unrelated brain PR.
      - "config/**"
      - "docs/GDD.md"
      - "scripts/**"
      # The deploy scripts get a cheap bash syntax gate here — an unparseable
      # install.sh otherwise ships straight to the droplet.
      - "deploy/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "brain/**"
      - "config/**"
      - "docs/GDD.md"
      - "scripts/**"
      - "deploy/**"
      - ".github/workflows/ci.yml"

jobs:
  python:
    name: brain (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brain
    steps:
      - uses: actions/checkout@v4

      # Cheap syntax gate for the deploy scripts. Full deploy CI (shellcheck,
      # systemd-analyze verify, twice-run idempotency in a container) is a
      # separate workflow; this catches the "install.sh does not even parse"
      # class before it reaches the droplet.
      - name: Deploy script syntax (bash -n)
        working-directory: .
        run: |
          bash -n deploy/install.sh
          bash -n deploy/alert.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            brain/requirements-dev.txt
            brain/pyproject.toml

      # Install only what the tests need. The heavy audio/STT stack
      # (webrtcvad, openwakeword, faster-whisper, numpy) is lazily imported
      # inside aura.audio.*, so the suite passes without it; tests exercise
      # the audio path with synthetic in-memory PCM only (constraint 5).
      # NO PyNaCl / discord.py[voice] — ever (constraint 2).
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install "discord.py>=2.4" "PyYAML>=6.0" "structlog>=24.1"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Pytest
        run: pytest

      # The GDD §16 table is generated from the config schema — a schema
      # change without the regenerated table is spec drift and fails here.
      - name: GDD config table in sync
        working-directory: .
        run: python scripts/gen_config_docs.py --check
