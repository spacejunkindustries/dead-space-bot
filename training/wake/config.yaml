# AURA wake-word training pipeline — configuration.
#
# OFFLINE pipeline. This file is read only by training/wake/generate_samples.py
# and training/wake/train.py, on a GPU box or Colab — never on the droplet,
# never by brain/. See training/wake/README.md for the run procedure.
#
# All relative paths are resolved against the directory containing this file.

phrase:
  # Spoken variants of the wake phrase. All variants train ONE binary model.
  # Spelling variants that force the TTS to the intended pronunciation are
  # fair game; unrelated phrases are not (train a separate model instead —
  # e.g. "hey overseer", the GDD §5.2 supported alternative).
  target_phrases:
    - "aura command"
    - "ora command"          # same pronunciation, nudges some TTS voices off "OW-ra"
  # Becomes the output filename: <model_name>.onnx. aura.yaml expects
  # /opt/aura/models/wake/aura_command.onnx, so keep this in sync.
  model_name: aura_command

  # Adversarial negatives (GDD §5.2 — the false-fire concern is the whole
  # point). Phonetically-adjacent phrases and EVE comms vocabulary that fleet
  # members WILL say all night; the model must learn to reject them.
  # openWakeWord additionally auto-generates adversarial texts derived from
  # the target phrase itself, so this list is a supplement, not the universe.
  custom_negative_phrases:
    - "aura"
    - "or a command"
    - "our command"
    - "a command"
    - "the command"
    - "commander"
    - "aura commander"
    - "on our command"
    - "your command"
    - "at your command"
    - "an hour of command"
    - "aura come on"
    - "aura calm down"
    - "concord"
    - "capsuleer"
    - "fleet command"
    - "fleet commander"
    - "warp command"
    - "corp command"
    - "wing command"

samples:
  # Positive clips for training / for held-out validation. The upstream
  # example notes >= 20000 training positives is where quality gets good;
  # generation is the cheap part, so err high.
  n_samples: 30000
  n_samples_val: 2000
  # Batch sizes: TTS generation batch (GPU-bound) and augmentation batch.
  tts_batch_size: 50
  augmentation_batch_size: 16
  # How many augmentation passes over the generated clips.
  augmentation_rounds: 1

paths:
  # Everything the pipeline clones/downloads/produces lives under work_dir.
  work_dir: ./work
  piper_sample_generator: ./work/piper-sample-generator
  openwakeword_repo: ./work/openWakeWord
  # LibriTTS-R multi-speaker TTS checkpoint (~904 voices; speed and noise are
  # randomised per sample by piper-sample-generator). Kept in the generator's
  # default models/ location so its internal default path also resolves.
  tts_model: ./work/piper-sample-generator/models/en_US-libritts_r-medium.pt
  # Clips, features and the trained model land here (train.py reads it too).
  output_dir: ./work/output
  # Room impulse responses + background noise/music used for augmentation.
  rir_dir: ./work/mit_rirs
  background_dirs:
    - ./work/audioset_16k
    - ./work/fma_16k
  # Pre-computed negative features (~2000 h speech/noise/music) and the
  # ~11 h real-speech validation features, downloaded from HuggingFace.
  feature_dir: ./work/features

assets:
  # HuggingFace sources, mirroring notebooks/automatic_model_training.ipynb.
  # If a mirror moves, any 16 kHz mono WAV noise collection dropped into the
  # background_dirs above works — the stage can then be skipped.
  features_repo: davidscripka/openwakeword_features
  feature_files:
    negative: openwakeword_features_ACAV100M_2000_hrs_16bit.npy
    validation: validation_set_features.npy
  rir_repo: davidscripka/MIT_environmental_impulse_responses
  audioset_repo: agkphysics/AudioSet
  audioset_tar: data/bal_train09.tar   # one shard is plenty for augmentation
  fma_repo: rudraml/fma
  fma_subset: small
  max_audioset_clips: 4000
  max_fma_clips: 2000
  tts_model_url: https://github.com/rhasspy/piper-sample-generator/releases/download/v2.0.0/en_US-libritts_r-medium.pt

augmentation:
  # Oversampling rate per background_dirs entry (order matches).
  background_duplication_rate: [1, 1]

training:
  # Passed straight through to openWakeWord's training config. The upstream
  # defaults (examples/custom_model.yml) are sane starting points; steps and
  # max_negative_weight are the knobs that move first.
  model_type: dnn
  layer_size: 32
  steps: 50000
  target_accuracy: 0.7
  target_recall: 0.5
  # Auto-training aims the negative weighting at this false-accept rate on
  # the real-speech validation features. 0.2/h ≈ one false wake per 5 hours
  # of continuous comms, before the wake.threshold gate is even applied.
  target_false_positives_per_hour: 0.2
  max_negative_weight: 1500
  batch_n_per_class:
    ACAV100M_sample: 1024
    adversarial_negative: 50
    positive: 50

validation:
  # Threshold sweep printed by train.py so the operator can pick
  # wake.threshold for aura.yaml from data instead of folklore.
  threshold_start: 0.30
  threshold_stop: 0.96
  threshold_step: 0.05
  # Cap on held-out clips scored per class (speed knob; 0 = all).
  max_clips: 2000
  # Duration represented by one frame of the validation feature stream.
  seconds_per_frame: 0.08
  # The sweep flags the lowest threshold whose real-speech false-accept rate
  # is at or below this, as a starting recommendation.
  max_false_accepts_per_hour: 0.2

deploy:
  # train.py --bundle assembles the full ONNX chain (melspectrogram →
  # embedding → wakeword) here, ready to scp to /opt/aura/models/wake/.
  bundle_dir: ./work/deploy_bundle
