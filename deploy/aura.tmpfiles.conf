# CORTANA runtime directory — /run/aura holds only the IPC socket (GDD §17.2/§22).
# Install as /etc/tmpfiles.d/aura.conf (deploy/install.sh does this), then:
#   systemd-tmpfiles --create /etc/tmpfiles.d/aura.conf
#
# The directory is owned by the aura user because Brain (running as aura)
# binds the socket here. The socket itself is created by Brain with mode 0660,
# so it is reachable only by the aura user/group — never off-box.
d /run/aura 0750 aura aura -
